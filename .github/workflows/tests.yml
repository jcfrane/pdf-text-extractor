name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        testbench: ['9.*', '10.*', '11.*']
        exclude:
          # Laravel 11 requires Testbench 9
          - laravel: '11.*'
            testbench: '10.*'
          - laravel: '11.*'
            testbench: '11.*'
          # Laravel 12 requires Testbench 10
          - laravel: '12.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '11.*'
          # Laravel 13 requires Testbench 11
          - laravel: '13.*'
            testbench: '9.*'
          - laravel: '13.*'
            testbench: '10.*'
          # Laravel 13 requires PHP 8.3+
          - php: '8.2'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest
